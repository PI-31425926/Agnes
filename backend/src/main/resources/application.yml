server:
  port: 8080

agnes:
  #api-key: sk-7z35UOA812ftlFNbac8gOUYmnzmJhJJWBqx8OzoFcbQlwKM1   # ?? Authorization ??
  api-url: https://apihub.agnes-ai.com/v1/chat/completions
  model: agnes-2.0-flash
  image-api-url: https://apihub.agnes-ai.com/v1/images/generations
  image-model: agnes-image-2.1-flash
  image-to-image-model: agnes-image-2.1-flash
  video-api-url: https://apihub.agnes-ai.com/v1/videos          # 创建视频
  video-status-url: https://apihub.agnes-ai.com/agnesapi        # 查询状态
  video-model: agnes-video-v2.0

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/agnes?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      #ddl-auto: validate       # 首次启动自动建表，生产建议改为 validate
      ddl-auto: update
    show-sql: false            # 调试时打印 SQL，可关闭
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  web:
    resources:
      static-locations: classpath:/static/
  mvc:
    static-path-pattern: /**
  data:
    redis:
      host: localhost          # Redis 服务器地址
      port: 6379
      password:                # 有密码则填写
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2


aes:
  secret: MyAESSecretKey12  # 生产环境应使用复杂随机字符串
jwt:
  secret: another-secret-key-another-secret-key
  expiration: 86400000

sa-token:
  token-name: Authorization      # 从请求头中读取的 Token 名称
  timeout: 8640000                 # Token 有效期 24 小时 (单位秒)
  is-read-cookie: false          # 不从 Cookie 读 Token
  is-read-head: true             # 从请求头读 Token
  token-prefix: "Bearer"         # 前缀 (前端无需改动)
  # 其他配置可按需调整